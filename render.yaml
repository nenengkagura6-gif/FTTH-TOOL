# Render Blueprint for FTTH Tool Backend (FastAPI + BackgroundTasks)
services:
  # 1. FastAPI Web Server (Free Tier)
  - type: web
    name: ftth-api
    env: python
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
# Render Blueprint for FTTH Tool Backend (FastAPI + Celery + Redis)
services:
  # 1. FastAPI Web Server
  - type: web
    name: ftth-api
    env: python
    plan: starter
    region: singapore
    branch: main
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: ftth-redis
          property: connectionString

  # 2. Celery Background Worker (Processing Engine)
  - type: worker
    name: ftth-worker
    env: python
    plan: starter
    region: singapore
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && celery -A celery_app worker --loglevel=info
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: ftth-redis
          property: connectionString

  # 3. Redis Message Broker
  - type: redis
    name: ftth-redis
    plan: starter
    region: singapore
    maxmemoryPolicy: noeviction
    ipAllowList: [] # Allows internal connections by default

  # 4. Celery Beat (Periodic Scheduler)
  - type: worker
    name: ftth-beat
    env: python
    plan: starter
    region: singapore
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && celery -A celery_app beat --loglevel=info
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: ftth-redis
          property: connectionString